# Production — Contabo VPS deployment
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# Prerequisites:
#   1. Populate server/.env with MONGO_URI, JWT_SECRET, API keys.
#   2. Place SSL certificates at nginx/ssl/cert.pem and nginx/ssl/key.pem
#      (or use Certbot for free SSL certificates).
#   3. DNS records must point to the VPS IP:
#        onhandl.com      → VPS IP
#        www.onhandl.com  → VPS IP
#        api.onhandl.com  → VPS IP

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - '3001'
      - '3002'
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: https://onhandl.com,https://www.onhandl.com
      APP_URL: https://onhandl.com
      API_URL: https://api.onhandl.com/api
      STRIPE_REDIRECT_URI: https://api.onhandl.com/api/payments/stripe/callback
      COOKIE_DOMAIN: .onhandl.com
      TELEGRAM_WEBHOOK_DOMAIN: api.onhandl.com
      TELEGRAM_WEBHOOK_PORT: 3002
      TELEGRAM_WEBHOOK_PATH: /telegram/webhook
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1' ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://api.onhandl.com
    restart: unless-stopped
    expose:
      - '3000'
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1' ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      server:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_healthy
