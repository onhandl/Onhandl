openapi: 3.0.0
info:
  title: Omniflow Agent API
  description: API documentation for the Omniflow multi-agent orchestration service.
  version: 1.0.0
servers:
  - url: http://localhost:3001
paths:
  /api/agents:
    get:
      summary: List all agents in a workspace
      security:
        - cookieAuth: []
      responses:
        '200':
          description: A list of agents
    post:
      summary: Create a new agent
      security:
        - cookieAuth: []
      responses:
        '201':
          description: Agent created successfully
  /api/agent/query:
    post:
      summary: Send a message to an agent and receive a streamed SSE response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                agentId:
                  type: string
                sessionId:
                  type: string
      responses:
        '200':
          description: SSE stream of AI response and tool calls/control instructions.
          content:
            text/event-stream:
              schema:
                type: string
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
