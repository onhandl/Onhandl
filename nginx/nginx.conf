worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream api_upstream {
        server server:3001;
    }

    upstream frontend_upstream {
        server client:3000;
    }

    # ── HTTP → HTTPS redirect (all hosts) ─────────────────────────────────────
    server {
        listen 80;
        server_name onhandl.com www.onhandl.com api.onhandl.com;
        return 301 https://$host$request_uri;
    }

    # ── api.onhandl.com → Fastify backend ────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.onhandl.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Allow large request bodies (agent uploads, PWA export zips)
        client_max_body_size 20M;

        location / {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE / long-poll support
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_buffering     off;
        }
    }

    # ── www.onhandl.com → redirect to onhandl.com ────────────────────────────
    server {
        listen 443 ssl;
        server_name www.onhandl.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 301 https://onhandl.com$request_uri;
    }

    # ── onhandl.com → Next.js frontend ───────────────────────────────────────
    server {
        listen 443 ssl;
        server_name onhandl.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Static assets served with long cache
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /public/ {
            proxy_pass http://frontend_upstream;
            proxy_cache_valid 200 7d;
        }

        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
