services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: omniflow

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    environment:
      # Override MONGO_URI to point at the compose mongo service
      # Comment this out if you're using MongoDB Atlas
      MONGO_URI: mongodb://mongo:27017/omniflow
    depends_on:
      - mongo

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # The client calls the server — in production point this at server's public URL
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo_data:
